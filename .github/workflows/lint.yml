name: Lint Code Base

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort

      - name: Run Black formatter check
        run: black --check src/ api/ dashboard/ tests/

      - name: Run Flake8 linter check
        run: flake8 src/ api/ dashboard/ tests/ --max-line-length=120 --exclude=__init__.py

      - name: Run Isort import ordering check
        run: isort --check-only src/ api/ dashboard/ tests/

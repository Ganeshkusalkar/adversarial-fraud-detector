name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black
    - name: Run Black
      run: black --check src/ api/ tests/ || true
    - name: Run Flake8
      run: flake8 src/ api/ tests/ --max-line-length=150 --extend-ignore=E501,E402,F401,E203,F541,W293,E302

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Test with pytest
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python -m pytest tests/unit/ -v --tb=short
        python -m pytest tests/integration/ -v --tb=short

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build docker image
      run: docker build -t fraud-detector:${GITHUB_SHA} .
    - name: Health Check (with retries & diagnostics)
      run: |
        set -o pipefail
        docker run -d --name fraud-api -p 8000:8000 fraud-detector:${GITHUB_SHA}
        CONTAINER=$(docker ps -q -l)
        echo "Started container: $CONTAINER"

        # Poll the health endpoint for up to 60s (12 x 5s)
        for i in $(seq 1 12); do
          if curl -sSf http://localhost:8000/health > /dev/null 2>&1; then
            echo "Health check passed"
            exit 0
          else
            echo "Waiting for app to be ready... (attempt $i/12)"
            sleep 5
          fi
        done

        echo "Health check failed after retries — printing container logs and exiting with failure"
        echo "==== CONTAINER LOGS ===="
        docker logs fraud-api || true
        echo "==== END CONTAINER LOGS ===="
        docker ps -a
        exit 1

name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black
    - name: Run Black
      run: black --check src/ api/ tests/ || true
    - name: Run Flake8
      run: flake8 src/ api/ tests/ --max-line-length=150 --extend-ignore=E501,E402,F401,E203,F541,W293,E302

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Test with pytest
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python -m pytest tests/unit/ -v --tb=short
        python -m pytest tests/integration/ -v --tb=short

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build docker image
      run: docker build -t fraud-detector:${GITHUB_SHA} .
    - name: Health Check
      run: |
        docker run -d --name fraud-api -p 8000:8000 fraud-detector:${GITHUB_SHA}
        sleep 10
        curl -f http://localhost:8000/health || (docker logs fraud-api && exit 1)

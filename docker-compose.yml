version: '3.8'

services:
  # --------------------------------------------------------
  # Neo4j Enterprise Graph Database
  # --------------------------------------------------------
  neo4j:
    image: neo4j:5.12.0
    container_name: adversarial_neo4j
    ports:
      - "7474:7474" # Cypher Browser HTTP
      - "7687:7687" # Bolt Protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # FastAPI High-Throughput Serving Gateway
  # --------------------------------------------------------
  api_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adversarial_api
    ports:
      - "8000:8000"
    environment:
      - API_PORT=8000
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      neo4j:
        condition: service_healthy
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # --------------------------------------------------------
  # Streamlit Real-Time Visual Dashboard
  # --------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adversarial_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_ENDPOINT=http://api_gateway:8000
    depends_on:
      - api_gateway
    command: ["streamlit", "run", "dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0"]

  # --------------------------------------------------------
  # Prometheus Metrics Monitoring
  # --------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: adversarial_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api_gateway

  # --------------------------------------------------------
  # Grafana Dashboard Visualization
  # --------------------------------------------------------
  grafana:
    image: grafana/grafana:10.1.5
    container_name: adversarial_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=fraudapp123
    depends_on:
      - prometheus

volumes:
  neo4j_data:
  neo4j_logs:

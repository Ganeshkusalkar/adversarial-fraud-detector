version: '3.8'

services:
  # --------------------------------------------------------
  # Neo4j Enterprise Graph Database
  # --------------------------------------------------------
  neo4j:
    image: neo4j:5.12.0
    container_name: adversarial_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    env_file:
      - .env
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-password}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # --------------------------------------------------------
  # FastAPI High-Throughput Serving Gateway
  # --------------------------------------------------------
  api_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adversarial_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # --------------------------------------------------------
  # Prometheus Metrics
  # --------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: adversarial_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # --------------------------------------------------------
  # Grafana Dashboard
  # --------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: adversarial_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

volumes:
  neo4j_data:
  neo4j_logs:
  prometheus_data:
  grafana_data:
